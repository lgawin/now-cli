name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain via Mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Verify Dependencies
        run: go mod tidy && git diff --exit-code

      - name: Run Unit Tests
        run: go test -v -race ./...

      - name: Compile & Package Artifacts
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/now
          cp scripts/adb-time-sync dist/
          chmod +x dist/adb-time-sync
          
          # Step into dist and compress them together locally
          cd dist
          tar -czf now-linux-x86_64.tar.gz now adb-time-sync

      - name: Run E2E Integration Test
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh
